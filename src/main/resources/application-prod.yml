# 生产环境配置
# 使用方式：java -jar app.jar --spring.profiles.active=prod

spring:
  application:
    name: eprint-backend

  config:
    import: optional:file:./application-local.yml

  # MySQL 数据源配置（生产环境）
  # 请根据实际生产环境修改以下配置
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:E_Bench}?useSSL=true&serverTimezone=UTC
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境只验证，不自动修改表结构
    show-sql: false       # 不显示 SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
      location: ${java.io.tmpdir}

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
  error:
    include-message: never
    include-stacktrace: never

# 日志配置
logging:
  level:
    com.eprint: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  file:
    name: logs/eprint-backend.log
    max-size: 10MB
    max-history: 30

# 文件上传目录
file:
  upload-dir: ${FILE_UPLOAD_DIR:/var/eprint/uploads}

external:
  token:
    provider: ${BLACKLAKE_PROVIDER:blacklake}
    base-url: ${BLACKLAKE_BASE_URL:https://liteweb.blacklake.cn}
    login-path: ${BLACKLAKE_LOGIN_PATH:/api/user/v1/users/_login}
    client-header-name: ${BLACKLAKE_CLIENT_HEADER_NAME:X-CLIENT}
    client-header-value: ${BLACKLAKE_CLIENT_HEADER_VALUE:lite-web}
    phone: ${BLACKLAKE_PHONE:}
    password: ${BLACKLAKE_PASSWORD:}
    refresh-interval-ms: ${BLACKLAKE_TOKEN_REFRESH_INTERVAL_MS:86400000}
    schedule-initial-delay-ms: ${BLACKLAKE_TOKEN_SCHEDULE_INITIAL_DELAY_MS:86400000}

    kingdee:
      provider: ${KINGDEE_PROVIDER:kingdee}
      base-url: ${KINGDEE_BASE_URL:https://api.kingdee.com}
      token-path: ${KINGDEE_TOKEN_PATH:/jdyconnector/app_management/kingdee_auth_token}
      client-id: ${KINGDEE_CLIENT_ID:}
      client-secret: ${KINGDEE_CLIENT_SECRET:}
      app-key: ${KINGDEE_APP_KEY:}
      app-secret: ${KINGDEE_APP_SECRET:}
      refresh-interval-ms: ${KINGDEE_TOKEN_REFRESH_INTERVAL_MS:43200000}
      schedule-initial-delay-ms: ${KINGDEE_TOKEN_SCHEDULE_INITIAL_DELAY_MS:43200000}
