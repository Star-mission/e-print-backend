spring:
  application:
    name: eprint-backend

  datasource:
    url: jdbc:mysql://localhost:3306/E_Bench?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/E_Bench_Logs
      database: E_Bench_Logs

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      location: ${java.io.tmpdir}

server:
  port: 3000

logging:
  level:
    com.eprint: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

file:
  upload-dir: ./uploads
