# 开发环境配置
# 使用方式：mvn spring-boot:run -Dspring-boot.run.profiles=dev

spring:
  application:
    name: eprint-backend

  # MySQL 数据源配置（Docker）
  datasource:
    url: jdbc:mysql://localhost:3306/E_Bench?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: eprint
    password: eprint123
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update  # 自动创建/更新表结构
    show-sql: true      # 显示 SQL 语句
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true  # 格式化 SQL


  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      location: ${java.io.tmpdir}

# 服务器配置
server:
  port: 3000

# 日志配置
logging:
  level:
    com.eprint: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# 文件上传目录
file:
  upload-dir: ./uploads

external:
  token:
    provider: blacklake
    base-url: https://liteweb.blacklake.cn
    login-path: /api/user/v1/users/_login
    client-header-name: X-CLIENT
    client-header-value: lite-web
    phone: ${BLACKLAKE_PHONE:}
    password: ${BLACKLAKE_PASSWORD:}
    refresh-interval-ms: ${BLACKLAKE_TOKEN_REFRESH_INTERVAL_MS:86400000}
    schedule-initial-delay-ms: ${BLACKLAKE_TOKEN_SCHEDULE_INITIAL_DELAY_MS:86400000}

    kingdee:
      provider: ${KINGDEE_PROVIDER:kingdee}
      base-url: ${KINGDEE_BASE_URL:https://api.kingdee.com}
      token-path: ${KINGDEE_TOKEN_PATH:/jdyconnector/app_management/kingdee_auth_token}
      client-id: ${KINGDEE_CLIENT_ID:}
      client-secret: ${KINGDEE_CLIENT_SECRET:}
      app-key: ${KINGDEE_APP_KEY:}
      app-secret: ${KINGDEE_APP_SECRET:}
      refresh-interval-ms: ${KINGDEE_TOKEN_REFRESH_INTERVAL_MS:43200000}
      schedule-initial-delay-ms: ${KINGDEE_TOKEN_SCHEDULE_INITIAL_DELAY_MS:43200000}
